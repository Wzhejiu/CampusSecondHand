<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>校园二手平台 - 用户端</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{padding:15px;padding-bottom:70px;font-family: "Microsoft YaHei", sans-serif;background:#f7f8fa;}
        .box{border:1px solid #e0e0e0;padding:12px;margin:10px 0;border-radius:8px;cursor:pointer;transition:0.2s;background:#fff;}
        .box:hover{border-color:#0066cc;}
        img{max-width:100px;max-height:100px;object-fit:cover;display:block;border-radius:6px;}
        input, select, textarea{margin:5px 0;padding:8px;width:100%;border:1px solid #ddd;border-radius:4px;}
        button{border:none;padding:8px 16px;border-radius:4px;cursor:pointer;transition:0.2s;}
        .page{display:none;}
        .page.active{display:block;}
        .hide{display:none !important;}

        .filter-bar{
            display:flex;
            gap:8px;
            margin:12px 0;
            align-items:center;
            flex-wrap:wrap;
        }
        .filter-bar input{flex:1;min-width:120px;}

        .auth-box{
            width: 340px;
            margin: 60px auto;
            text-align: center;
            padding:25px;
            border-radius:12px;
            box-shadow:0 0 12px rgba(0,0,0,0.1);
            background:#fff;
        }
        .auth-box button{background:#0066cc;color:white;margin:8px 0;}
        .auth-box .btn2{background:#666;}
        .tab-wrap{display:flex;margin-bottom:20px;}
        .tab-wrap div{flex:1;padding:12px;cursor:pointer;border-bottom:2px solid #eee;}
        .tab-wrap div.active{border-color:#0066cc;color:#0066cc;font-weight:bold;}

        .tab-bar{
            position:fixed;bottom:0;left:0;right:0;
            background:#fff;display:flex;justify-content:space-around;
            padding:10px 0;border-top:1px solid #eee;
        }
        .tab-item{text-align:center;color:#666;cursor:pointer;}
        .tab-item.active{color:#0066cc;}

        .comment-box{border-top:1px solid #eee;margin-top:20px;padding-top:10px;}
        .comment-item{background:#f8f9fa;padding:10px;margin:6px 0;border-radius:6px;}
        .comment-empty{color:#999;text-align:center;padding:10px;}

        .order-item{background:#f7fcff;padding:12px;margin:8px 0;border-radius:6px;border-left:4px solid #0066cc;}
        .buy-btn{background:#43a047;color:white;margin:12px 0;width:100%;padding:12px;}
        .logout-btn{background:#ff5722;color:white;width:100%;margin-top:20px;}

        .fab-btn{
            position:fixed;bottom:80px;right:20px;
            width:60px;height:60px;border-radius:50%;
            background:#0066cc;color:white;font-size:30px;
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,0.2);
        }

        .modal-overlay{
            position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.5);display:none;
            align-items:center;justify-content:center;z-index:1000;
        }
        .modal-content{background:white;padding:25px;border-radius:10px;width:90%;max-width:400px;}

        .profile-header{text-align:center;margin:25px 0;}
        .avatar{
            width:85px;height:85px;border-radius:50%;
            background:#f5f5f5;display:flex;align-items:center;
            justify-content:center;font-size:42px;margin:0 auto 12px;
            cursor:pointer;border:2px solid #ddd;
        }
    </style>
</head>
<body>

<div id="authBox" class="auth-box">
    <div class="tab-wrap">
        <div class="active" onclick="switchAuth('login')">登录</div>
        <div onclick="switchAuth('register')">注册</div>
    </div>

    <div id="loginPanel">
        <input type="text" id="loginUser" placeholder="用户名">
        <input type="password" id="loginPwd" placeholder="密码">
        <button onclick="userLogin()">登录</button>
        <button class="btn2" onclick="switchAuth('register')">去注册</button>
    </div>

    <div id="registerPanel" class="hide">
        <input type="text" id="regUser" placeholder="用户名">
        <input type="password" id="regPwd" placeholder="密码">
        <input type="password" id="regConfirmPwd" placeholder="确认密码">
        <input type="text" id="regPhone" placeholder="手机号">
        <button onclick="userRegister()">注册</button>
        <button class="btn2" onclick="switchAuth('login')">返回登录</button>
    </div>
</div>

<div id="mainContainer" class="hide">
    <div id="homePage" class="page active">
        <h2>📦 商品列表</h2>
        <div class="filter-bar">
            <input type="text" id="search" placeholder="搜索" oninput="loadGoods()">
            <select id="category" onchange="loadGoods()">
                <option value="全部">全部分类</option>
                <option value="教材教辅">教材教辅</option>
                <option value="数码电子">数码电子</option>
                <option value="生活用品">生活用品</option>
            </select>
        </div>
        <div id="goodsList"></div>
    </div>

    <div id="detailPage" class="page">
        <h2>商品详情</h2>
        <div id="detail"></div>
        <button class="buy-btn" onclick="buyGoods()">立即购买</button>
    </div>

    <div id="minePage" class="page">
        <h2>👤 个人中心</h2>
        <div class="profile-header">
            <div class="avatar">👤</div>
            <p id="nickname"></p>
        </div>
        <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="go('homePage')">首页</div>
        <div class="tab-item" onclick="go('minePage')">我的</div>
    </div>

    <div class="fab-btn" onclick="document.getElementById('publishModal').style.display='flex'">+</div>

    <div class="modal-overlay" id="publishModal">
        <div class="modal-content">
            <h3>发布商品</h3>
            <input id="gName" placeholder="商品名"><br>
            <input id="gPrice" placeholder="价格"><br>
            <select id="gCate">
                <option>教材教辅</option>
                <option>数码电子</option>
                <option>生活用品</option>
            </select><br>
            <button onclick="publishGoods()">发布</button>
            <button onclick="document.getElementById('publishModal').style.display='none'">取消</button>
        </div>
    </div>
</div>

<script>
// ====================== 完全按你给的接口地址 ======================
const API = "http://172.19.229.149:5000/api";

let token = localStorage.getItem("token") || "";
let user = JSON.parse(localStorage.getItem("user")) || null;
let currentGoods = null;

// ====================== 页面切换 ======================
function go(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page).classList.add('active');
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    if(event) event.target.classList.add('active');
}

function switchAuth(t) {
    document.querySelectorAll('.tab-wrap div').forEach(d => d.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('loginPanel').classList.toggle('hide', t !== 'login');
    document.getElementById('registerPanel').classList.toggle('hide', t !== 'register');
}

// ====================== 注册（严格按你接口） ======================
async function userRegister() {
    let username = document.getElementById('regUser').value.trim();
    let password = document.getElementById('regPwd').value.trim();
    let confirmPassword = document.getElementById('regConfirmPwd').value.trim();
    let phone = document.getElementById('regPhone').value.trim();

    try {
        let res = await fetch("http://172.19.229.149:5000/api/Auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password, confirmPassword, phone })
        });
        let json = await res.json();
        alert(json.message);
        if (json.success) switchAuth('login');
    } catch (err) {
        alert("注册请求失败：" + err.message);
    }
}

// ====================== 普通登录（严格按你接口） ======================
async function userLogin() {
    let username = document.getElementById('loginUser').value.trim();
    let password = document.getElementById('loginPwd').value.trim();

    try {
        let res = await fetch("http://172.19.229.149:5000/api/Auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });
        let json = await res.json();
        if (!json.success) {
            alert(json.message);
            return;
        }

        token = json.data.token;
        user = json.data.userInfo;
        localStorage.setItem("token", token);
        localStorage.setItem("user", JSON.stringify(user));

        document.getElementById("authBox").classList.add("hide");
        document.getElementById("mainContainer").classList.remove("hide");
        document.getElementById("nickname").innerText = user.username;
        loadGoods();
    } catch (err) {
        alert("登录请求失败：" + err.message);
    }
}

// ====================== 退出 ======================
function logout() {
    localStorage.clear();
    location.reload();
}

// ====================== 商品列表 ======================
async function loadGoods() {
    try {
        let res = await fetch(API + "/Goods", {
            headers: { Authorization: token }
        });
        let json = await res.json();
        let html = "";
        if (json.success && json.data) {
            json.data.forEach(item => {
                html += `<div class="box" onclick="showDetail(${item.id})">
                    <p>${item.name}</p>
                    <p>¥${item.price}</p>
                </div>`;
            });
        } else {
            html = "<div class='box'>暂无商品</div>";
        }
        document.getElementById("goodsList").innerHTML = html;
    } catch (e) {
        document.getElementById("goodsList").innerHTML = "<div class='box'>加载失败</div>";
    }
}

// ====================== 商品详情 ======================
async function showDetail(id) {
    try {
        let res = await fetch(API + "/Goods/" + id, {
            headers: { Authorization: token }
        });
        let json = await res.json();
        currentGoods = json.data;
        document.getElementById("detail").innerHTML = `
            <p>名称：${currentGoods.name}</p>
            <p>价格：${currentGoods.price}</p>
            <p>分类：${currentGoods.category}</p>
        `;
        go("detailPage");
    } catch (e) {}
}

// ====================== 购买 ======================
async function buyGoods() {
    if (!currentGoods) return;
    try {
        let res = await fetch(API + "/Order/create", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                Authorization: token
            },
            body: JSON.stringify({ goodsId: currentGoods.id })
        });
        let json = await res.json();
        alert(json.message);
        if (json.success) go("homePage");
    } catch (e) {}
}

// ====================== 发布商品 ======================
async function publishGoods() {
    let name = document.getElementById("gName").value;
    let price = document.getElementById("gPrice").value;
    let category = document.getElementById("gCate").value;

    try {
        let res = await fetch(API + "/Goods/publish", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                Authorization: token
            },
            body: JSON.stringify({ name, price, category })
        });
        let json = await res.json();
        alert(json.message);
        if (json.success) {
            document.getElementById("publishModal").style.display = "none";
            loadGoods();
        }
    } catch (e) {}
}

// ====================== 初始化 ======================
window.onload = () => {
    if (user && token) {
        document.getElementById("authBox").classList.add("hide");
        document.getElementById("mainContainer").classList.remove("hide");
        document.getElementById("nickname").innerText = user.username;
        loadGoods();
    }
};
</script>
</body>
</html>
